services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flip7
      POSTGRES_PASSWORD: flip7
      POSTGRES_DB: flip7
    ports:
      - '5432:5432'
    volumes:
      - flip7_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flip7']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: postgres://flip7:flip7@postgres:5432/flip7
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      VITE_SERVER_URL: http://server:4000
    ports:
      - '5173:5173'
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  flip7_pg:
